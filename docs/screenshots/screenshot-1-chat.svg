<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580">
  <defs>
    <linearGradient id="chatBubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#388bfd;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glowBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="900" height="580" fill="#1c2128" rx="8" stroke="none" stroke-width="1"/>
    <rect x="0" y="0" width="900" height="40" fill="#21262d" rx="8" stroke="none" stroke-width="1"/>
    <rect x="0" y="36" width="900" height="4" fill="#21262d" rx="0" stroke="none" stroke-width="1"/>
    <rect x="16" y="12" width="60" height="16" fill="#30363d" rx="8" stroke="none" stroke-width="1"/>
    <rect x="86" y="12" width="60" height="16" fill="#30363d" rx="8" stroke="none" stroke-width="1"/>
    <rect x="156" y="12" width="60" height="16" fill="#30363d" rx="8" stroke="none" stroke-width="1"/>
    <rect x="240" y="8" width="440" height="24" fill="#0d1117" rx="12" stroke="#30363d" stroke-width="1"/>
    <text x="460" y="24" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" fill="#8b949e" text-anchor="middle" font-weight="normal">https://example.com — AI Research Page</text>
    <circle cx="862" cy="20" r="6" fill="#30363d"/>
    <circle cx="842" cy="20" r="6" fill="#30363d"/>
    <circle cx="822" cy="20" r="6" fill="#30363d"/>
  
    <rect x="0" y="40" width="600" height="540" fill="#0d1117" rx="0" stroke="none" stroke-width="1"/>
    <rect x="20" y="60" width="400" height="18" fill="#1f2937" rx="6" stroke="none" stroke-width="1"/>
    <rect x="20" y="88" width="340" height="12" fill="#161b22" rx="4" stroke="none" stroke-width="1"/>
    <rect x="20" y="108" width="380" height="12" fill="#161b22" rx="4" stroke="none" stroke-width="1"/>
    <rect x="20" y="128" width="290" height="12" fill="#161b22" rx="4" stroke="none" stroke-width="1"/>
    <rect x="20" y="158" width="560" height="100" fill="#161b22" rx="6" stroke="#21262d" stroke-width="1"/>
    <rect x="20" y="270" width="560" height="80" fill="#161b22" rx="6" stroke="#21262d" stroke-width="1"/>
    <text x="240" y="420" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="14" fill="#1f2937" text-anchor="middle" font-weight="normal">Page content...</text>
  
    <rect x="0" y="40" width="600" height="540" fill="none" stroke="url(#glowBorder)" stroke-width="3" filter="url(#softGlow)" rx="0"/>
    <rect x="0" y="40" width="600" height="540" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.9"/>
  
    <rect x="600" y="40" width="300" height="540" fill="#0d1117" rx="0" stroke="#30363d" stroke-width="1"/>

    <!-- Panel header -->
    <rect x="600" y="40" width="300" height="44" fill="#161b22" rx="0" stroke="#30363d" stroke-width="1"/>
    <circle cx="622" cy="62" r="10" fill="#1f6feb"/>
    <text x="637" y="57" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="14" fill="#e6edf3" text-anchor="start" font-weight="normal">🤖</text>
    <text x="656" y="67" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="14" fill="#e6edf3" text-anchor="start" font-weight="bold">Claude Free</text>
    <rect x="740" y="55" width="100" height="16" fill="#3fb950" rx="8" stroke="none" stroke-width="1"/><text x="748" y="66" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" fill="#fff" text-anchor="start" font-weight="bold">Pollinations</text>

    <!-- Chat messages -->
    <rect x="610" y="96" width="280" height="44" fill="#1f2937" rx="8" stroke="none" stroke-width="1"/>
    <text x="620" y="112" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#e6edf3" text-anchor="start" font-weight="normal">Summarize this article for me</text>
    <text x="620" y="128" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#e6edf3" text-anchor="start" font-weight="normal">and extract the key points.</text>

    <rect x="610" y="150" width="260" height="80" fill="#161b22" rx="8" stroke="#30363d" stroke-width="1"/>
    <text x="620" y="166" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" fill="#58a6ff" text-anchor="start" font-weight="bold">✦  Claude Free</text>
    <text x="620" y="182" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#e6edf3" text-anchor="start" font-weight="normal">Sure! Here are the key points:</text>
    <text x="620" y="198" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#8b949e" text-anchor="start" font-weight="normal">• AI is transforming research</text>
    <text x="620" y="214" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#8b949e" text-anchor="start" font-weight="normal">• New models reduce costs by 80%</text>
    <text x="620" y="230" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#8b949e" text-anchor="start" font-weight="normal">• Open models closing the gap...</text>

    <rect x="610" y="244" width="280" height="36" fill="#1f2937" rx="8" stroke="none" stroke-width="1"/>
    <text x="620" y="258" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#e6edf3" text-anchor="start" font-weight="normal">Can you use computer use to</text>
    <text x="620" y="274" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#e6edf3" text-anchor="start" font-weight="normal">click the "Read More" button?</text>

    <rect x="610" y="290" width="260" height="60" fill="#161b22" rx="8" stroke="#1f6feb" stroke-width="1"/>
    <text x="620" y="306" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" fill="#58a6ff" text-anchor="start" font-weight="bold">✦  Computer Use Active</text>
    <text x="620" y="322" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#e6edf3" text-anchor="start" font-weight="normal">🖱️  Moving to "Read More"...</text>
    <text x="620" y="338" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#3fb950" text-anchor="start" font-weight="normal">✅  Clicked successfully</text>

    <!-- Input area -->
    <rect x="600" y="500" width="300" height="80" fill="#161b22" rx="0" stroke="#30363d" stroke-width="1"/>
    <rect x="608" y="510" width="220" height="34" fill="#0d1117" rx="8" stroke="#30363d" stroke-width="1"/>
    <text x="618" y="532" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" fill="#8b949e" text-anchor="start" font-weight="normal">Ask anything...</text>
    <rect x="834" y="510" width="58" height="34" fill="#1f6feb" rx="8" stroke="none" stroke-width="1"/>
    <text x="863" y="532" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Send</text>

    <!-- Phantom cursor (computer use) -->
    <circle cx="280" cy="320" r="10" fill="none" stroke="#58a6ff" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
    <circle cx="280" cy="320" r="4" fill="#58a6ff" filter="url(#glow)"/>
  
</svg>